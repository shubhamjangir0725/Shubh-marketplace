<!DOCTYPE html>
<html>
<head>
  <title>Login - Shubh Marketplace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>Shubh Marketplace</h2>
</header>

<section class="hero">

<h1>Login</h1>

<form id="loginForm">

<input type="email" id="email" placeholder="Enter Email" required><br><br>

<input type="password" id="password" placeholder="Enter Password" required><br><br>

<button type="submit" class="btn login">Login</button>

</form>

<p id="message"></p>

</section>

<footer>
  © 2026 Shubh Marketplace
</footer>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try{
        const response = await fetch("https://shubham-marketplace-backend.onrender.com/login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({ email, password })
        });

        const data = await response.json();

        alert(data.message);

        if(response.ok){
            window.location.href="index.html";
        }

    }catch(error){
        alert("Server Error ❌");
    }
});
</script>

</body>
</html>
