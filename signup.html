<!DOCTYPE html>
<html>
<head>
  <title>Signup - Shubh Marketplace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>Shubh Marketplace</h2>
</header>

<section class="hero">

  <h1>Create Account</h1>

  <form id="signupForm">

    <input type="text" id="name" placeholder="Enter Name" required><br><br>

    <input type="email" id="email" placeholder="Enter Email" required><br><br>

    <input type="password" id="password" placeholder="Enter Password" required><br><br>

    <button type="submit" class="btn sell">Create Account</button>

  </form>

  <p id="message"></p>

</section>

<footer>
  © 2026 Shubh Marketplace
</footer>

<script>
document.getElementById("signupForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    try{
        const response = await fetch("https://shubham-marketplace-backend.onrender.com/signup",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(data)
        });

        const result = await response.json();

        alert(result.message);

        if(response.ok){
            window.location.href="login.html";
        }

    }catch(error){
        alert("Server Error ❌");
    }
});
</script>

</body>
</html>
